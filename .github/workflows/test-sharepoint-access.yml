name: Test SharePoint Access

on:
  workflow_dispatch:

jobs:
  test-sharepoint-access:
    runs-on: ubuntu-latest

    steps:
      - name: Get Microsoft Graph access token
        id: token
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

      - name: Test access to WeeklyVerseCMS site
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/sites/boksshk.sharepoint.com:/sites/WeeklyVerseCMS")

          BODY=$(echo "$RESPONSE" | sed -n '/HTTP_STATUS/!p')
          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          echo "HTTP status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Failed to access WeeklyVerseCMS"
            echo "$BODY"
            exit 1
          fi

          echo "Successfully accessed WeeklyVerseCMS"
