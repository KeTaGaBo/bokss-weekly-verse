name: Test Weekly Verse Images Access

on:
  workflow_dispatch:

jobs:
  test-weekly-verse-images-access:
    runs-on: ubuntu-latest

    steps:
      - name: Get Microsoft Graph access token
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get Microsoft Graph access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

      - name: Get WeeklyVerseCMS site id
        run: |
          SITE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/sites/boksshk.sharepoint.com:/sites/WeeklyVerseCMS")

          SITE_BODY=$(echo "$SITE_RESPONSE" | sed -n '/HTTP_STATUS/!p')
          SITE_STATUS=$(echo "$SITE_RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          echo "Site HTTP status: $SITE_STATUS"

          if [ "$SITE_STATUS" != "200" ]; then
            echo "Failed to get WeeklyVerseCMS site id"
            echo "$SITE_BODY"
            exit 1
          fi

          SITE_ID=$(echo "$SITE_BODY" | jq -r '.id')

          if [ "$SITE_ID" = "null" ] || [ -z "$SITE_ID" ]; then
            echo "Site id not found"
            echo "$SITE_BODY"
            exit 1
          fi

          echo "SITE_ID=$SITE_ID" >> "$GITHUB_ENV"
          echo "WeeklyVerseCMS site id found"

      - name: Find Weekly Verse Images document library
        run: |
          DRIVES_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/sites/$SITE_ID/drives")

          DRIVES_BODY=$(echo "$DRIVES_RESPONSE" | sed -n '/HTTP_STATUS/!p')
          DRIVES_STATUS=$(echo "$DRIVES_RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          echo "Drives HTTP status: $DRIVES_STATUS"

          if [ "$DRIVES_STATUS" != "200" ]; then
            echo "Failed to list document libraries"
            echo "$DRIVES_BODY"
            exit 1
          fi

          DRIVE_ID=$(echo "$DRIVES_BODY" | jq -r '.value[] | select(.name=="Weekly Verse Images") | .id')

          if [ "$DRIVE_ID" = "null" ] || [ -z "$DRIVE_ID" ]; then
            echo "Weekly Verse Images document library not found"
            echo "Available libraries:"
            echo "$DRIVES_BODY" | jq -r '.value[] | .name'
            exit 1
          fi

          echo "DRIVE_ID=$DRIVE_ID" >> "$GITHUB_ENV"
          echo "Weekly Verse Images document library found"

      - name: List image files
        run: |
          FILES_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/drives/$DRIVE_ID/root/children?\$select=id,name,file,createdDateTime,lastModifiedDateTime,size,webUrl")

          FILES_BODY=$(echo "$FILES_RESPONSE" | sed -n '/HTTP_STATUS/!p')
          FILES_STATUS=$(echo "$FILES_RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          echo "Files HTTP status: $FILES_STATUS"

          if [ "$FILES_STATUS" != "200" ]; then
            echo "Failed to list files"
            echo "$FILES_BODY"
            exit 1
          fi

          FILE_COUNT=$(echo "$FILES_BODY" | jq '.value | length')
          echo "File count: $FILE_COUNT"

          echo "Files:"
          echo "$FILES_BODY" | jq -r '.value[] | "\(.name) | \(.createdDateTime) | \(.id)"'

          if [ "$FILE_COUNT" = "0" ]; then
            echo "No image files found"
            exit 1
          fi
