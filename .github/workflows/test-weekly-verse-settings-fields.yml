name: Test Weekly Verse Settings Fields

on:
  workflow_dispatch:

jobs:
  test-settings-fields:
    runs-on: ubuntu-latest

    steps:
      - name: Get Microsoft Graph access token
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get Microsoft Graph access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

      - name: Get WeeklyVerseCMS site id
        run: |
          SITE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/sites/boksshk.sharepoint.com:/sites/WeeklyVerseCMS")

          SITE_BODY=$(echo "$SITE_RESPONSE" | sed -n '/HTTP_STATUS/!p')
          SITE_STATUS=$(echo "$SITE_RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          echo "Site HTTP status: $SITE_STATUS"

          if [ "$SITE_STATUS" != "200" ]; then
            echo "Failed to get site id"
            echo "$SITE_BODY"
            exit 1
          fi

          SITE_ID=$(echo "$SITE_BODY" | jq -r '.id')
          echo "SITE_ID=$SITE_ID" >> "$GITHUB_ENV"

      - name: Find Weekly Verse Settings list
        run: |
          LISTS_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/sites/$SITE_ID/lists")

          LISTS_BODY=$(echo "$LISTS_RESPONSE" | sed -n '/HTTP_STATUS/!p')
          LISTS_STATUS=$(echo "$LISTS_RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          echo "Lists HTTP status: $LISTS_STATUS"

          if [ "$LISTS_STATUS" != "200" ]; then
            echo "Failed to list SharePoint lists"
            echo "$LISTS_BODY"
            exit 1
          fi

          SETTINGS_LIST_ID=$(echo "$LISTS_BODY" | jq -r '.value[] | select(.displayName=="Weekly Verse Settings") | .id')

          if [ "$SETTINGS_LIST_ID" = "null" ] || [ -z "$SETTINGS_LIST_ID" ]; then
            echo "Weekly Verse Settings list not found"
            echo "Available lists:"
            echo "$LISTS_BODY" | jq -r '.value[] | .displayName'
            exit 1
          fi

          echo "SETTINGS_LIST_ID=$SETTINGS_LIST_ID" >> "$GITHUB_ENV"
          echo "Weekly Verse Settings list found"

      - name: Read GlobalSettings item fields
        run: |
          ITEM_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/sites/$SITE_ID/lists/$SETTINGS_LIST_ID/items/1?expand=fields")

          ITEM_BODY=$(echo "$ITEM_RESPONSE" | sed -n '/HTTP_STATUS/!p')
          ITEM_STATUS=$(echo "$ITEM_RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          echo "Item HTTP status: $ITEM_STATUS"

          if [ "$ITEM_STATUS" != "200" ]; then
            echo "Failed to read GlobalSettings item"
            echo "$ITEM_BODY"
            exit 1
          fi

          echo "Field names returned by Microsoft Graph:"
          echo "$ITEM_BODY" | jq -r '.fields | keys[]'

          echo ""
          echo "Field values:"
          echo "$ITEM_BODY" | jq '.fields'
